x-gpu-config: &gpu-config
  runtime: nvidia
  environment:
    - USER
    - DISPLAY=${DISPLAY:?err}
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
    - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
    - RMW_IMPLEMENTATION=rmw_zenoh_cpp

x-cpu-config: &cpu-config
  environment:
    - USER
    - DISPLAY=${DISPLAY:?err}
    - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
    - RMW_IMPLEMENTATION=rmw_zenoh_cpp
  devices:
    - /dev/dri

services:
  robot_physical_zed:
    # Build directly from the local merged Dockerfile
    build:
      context: ../
      dockerfile: docker/Dockerfile.physical.zed
    container_name: robot_physical_zed_container

    # Network and Permissions (from physical compose)
    network_mode: host
    ipc: host
    group_add:
      - dialout
    privileged: true
    tty: true
    stdin_open: true

    # Merged Environment Variables
    environment:
      - USER
      - DISPLAY=${DISPLAY:?err}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - NVIDIA_DRIVER_CAPABILITIES=all

    # GPU Passthrough (from ZED compose)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Merged Volumes
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../:/ros2_ws/src
      - ros_build_cache:/ros2_ws/build
      - ros_install_cache:/ros2_ws/install
      - ros_log_cache:/ros2_ws/log
      - /dev:/dev

    # Your original launch sequence
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               colcon build --symlink-install --parallel-workers 1 &&
               source install/setup.bash &&
               { ros2 run rmw_zenoh_cpp rmw_zenohd & } &&
               sleep 2 &&
               echo Start_Joy_Controller========================================= &&
               { ros2 launch joy_interface joy_control_smooth.launch.py < /dev/null & } &&
               sleep 2 &&
               echo Start_Real_Hardware========================================== &&
               { ros2 launch robot_bringup real_omnibot.launch.py &} &&
               echo Start_Navigation========================================== &&
               exec ros2 launch robot_navigation localization_Nav2_real.launch.py"

volumes:
  ros_build_cache:
  ros_install_cache:
  ros_log_cache:
