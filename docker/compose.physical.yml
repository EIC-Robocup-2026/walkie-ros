services:
  zed_wrapper:
    image: zed-docker-zed_wrapper:latest
    build:
      context: .
      dockerfile: Dockerfile.physical
    container_name: robot_physical-zed_wrapper
    runtime: nvidia

    # Network and permissions
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    tty: true
    stdin_open: true
    group_add:
      - dialout

    # Environment
    environment:
      - USER
      - DISPLAY=${DISPLAY:?err}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      # Uncomment if you actually use Zenoh:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp

    # GPU passthrough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Volumes
    volumes:
      # X11 for RViz / ZED tools
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Your local workspace (optional — only if you have custom packages)
      - ../../../:/ros2_ws/src
      # Persistent ZED SDK AI models (avoids re-optimizing on every run)
      - zed_resources:/usr/local/zed/resources
      - zed_settings:/usr/local/zed/settings
      # USE NAMED VOLUMES FOR CACHING
      - ros_build_cache:/ros2_ws/build
      - ros_install_cache:/ros2_ws/install
      - ros_log_cache:/ros2_ws/log
      # Device passthrough for the camera (USB)
      - /dev:/dev

    # Just launch the ZED 2i wrapper
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               cd /ros2_ws &&
               if [ ! -f install/setup.bash ]; then
                 echo 'First run detected! Installing dependencies and building...' &&
                 apt-get update && \
                 rosdep update && \
                 rosdep install --from-paths src -y -i && \
                 source /home/zed_deps_ws/install/setup.bash && \
                 colcon build --symlink-install --parallel-workers 1;
               else
                 echo 'Workspace already built! Skipping setup...' ;
               fi &&
               source install/setup.bash &&
               { ros2 run rmw_zenoh_cpp rmw_zenohd & } &&
               { ros2 launch joy_interface joy_control_smooth.launch.py & }"

volumes:
  zed_resources:
  zed_settings:
  ros_build_cache:
  ros_install_cache:
  ros_log_cache:
