services:
  zed_wrapper:
    image: zed-docker-zed_wrapper:latest
    user: root
    build:
      context: ../../..
      dockerfile: src/walkie-ros/docker/Dockerfile.physical
    container_name: robot_physical-zed_wrapper
    runtime: nvidia

    # Network and permissions
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    tty: true
    stdin_open: true
    group_add:
      - dialout

    # Environment
    environment:
      - USER
      - DISPLAY=${DISPLAY:?err}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=23
      # Uncomment if you actually use Zenoh:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp

    # GPU passthrough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Volumes
    volumes:
      # X11 for RViz / ZED tools
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Your local workspace (optional — only if you have custom packages)
      - ../../../src:/ros2_ws/src
      # Checkpoint for the RS model (optional, but avoids re-downloading and re-optimizing on every run)
      #pls pass the actual model path in the left side, e.g. /home/user/checkpoint-rs.tar
      - ./models/checkpoint-rs.tar:/root/graspnet-baseline/logs/log_rs/checkpoint-rs.tar:ro
      # Persistent ZED SDK AI models (avoids re-optimizing on every run)
      - zed_resources:/usr/local/zed/resources
      - zed_settings:/usr/local/zed/settings
      # USE NAMED VOLUMES FOR CACHING
      - ros_build_cache:/ros2_ws/build
      - ros_install_cache:/ros2_ws/install
      - ros_log_cache:/ros2_ws/log
      # Device passthrough for the camera (USB)
      - /dev:/dev

    # Just launch the ZED 2i wrapper
    command: >
      bash /ros2_ws/src/walkie-ros/docker/entrypoint.sh

volumes:
  zed_resources:
  zed_settings:
  ros_build_cache:
  ros_install_cache:
  ros_log_cache:  