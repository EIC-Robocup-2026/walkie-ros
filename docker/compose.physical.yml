x-gpu-config: &gpu-config
  runtime: nvidia
  environment:
    - USER
    - DISPLAY=${DISPLAY:?err}
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
    - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
    - RMW_IMPLEMENTATION=rmw_zenoh_cpp

x-cpu-config: &cpu-config
  environment:
    - USER
    - DISPLAY=${DISPLAY:?err}
    - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
    - RMW_IMPLEMENTATION=rmw_zenoh_cpp
  devices:
    - /dev/dri
services:
  robot_simulation:
    image: ghcr.io/eic-robocup-2026/walkie-ros/walkie-physical:feat-github_action_ci-cd
    <<: [*cpu-config]
    container_name: robot-physical
    network_mode: host
    ipc: host
    group_add:
      - dialout
    privileged: true
    tty: true # 1. Creates the fake terminal
    stdin_open: true # 2. Keeps it open so ROS doesn't auto-shutdown
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../:/ros2_ws/src
      - ../build:/ros2_ws/build
      - /dev:/dev
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               colcon build --symlink-install --parallel-workers 1 &&
               source install/setup.bash &&
               { ros2 run rmw_zenoh_cpp rmw_zenohd & } &&
               sleep 2 &&
               echo Start_Joy_Controller========================================= &&
               { ros2 launch joy_interface joy_control_smooth.launch.py < /dev/null & } &&
               sleep 2 &&
               echo Start_Real_Hardware========================================== &&
               exec ros2 launch robot_bringup real_omnibot.launch.py"
