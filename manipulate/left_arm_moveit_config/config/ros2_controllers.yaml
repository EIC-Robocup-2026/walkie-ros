controller_manager:
  ros__parameters:
    update_rate: 20
    
    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    left_hand_controller:
      type: position_controllers/GripperActionController  # Position-based
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_arm_controller:
  ros__parameters:
    joints:
      - left_joint1
      - left_joint2
      - left_joint3
      - left_joint4
      - left_joint5
      - left_joint6
      - left_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true

left_hand_controller:
  ros__parameters:
    joint: left_gripper_worm_gear_joint
    
    # Control parameters
    goal_tolerance: 0.01
    max_effort: 100.0
    max_velocity: 0.1
    
    # Stalling detection (useful for grasping)
    allow_stalling: true
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
    
    # Action monitoring
    action_monitor_rate: 20.0