# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    left_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_gripper_controller:
      type: position_controllers/GripperActionController

    right_gripper_controller:
      type: position_controllers/GripperActionController

    lift_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarm_left_joint1
      - openarm_left_joint2
      - openarm_left_joint3
      - openarm_left_joint4
      - openarm_left_joint5
      - openarm_left_joint6
      - openarm_left_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # Publish joint states at 50 Hz so MoveIt gets low-latency feedback.
    state_publish_rate: 50.0
    # Check goal satisfaction at 20 Hz (default) — keeps CPU load low while
    # still reporting SUCCEEDED within ~50 ms of the trajectory end.
    action_monitor_rate: 20.0
    # cuMotion's minimum-jerk trajectories can end with a tiny (~1e-3 rad/s)
    # non-zero velocity on the final point; the JTC otherwise REJECTS the goal
    # ("Velocity of last trajectory point ... is not zero"). No-op for OMPL
    # (TOTG ends at exactly zero), required for the cumotion pipeline.
    allow_nonzero_velocity_at_trajectory_end: true
    constraints:
      # Allow up to 0.5 s after the planned trajectory end-time for the robot
      # to settle into the goal position.  Without this the JTC immediately
      # ABORTs if the robot hasn't stopped exactly on time.
      goal_time: 0.5
      # Consider joints "stopped" if velocity is below 0.05 rad/s.
      stopped_velocity_tolerance: 0.05
      # Per-joint goal position tolerance (rad).  Loosen slightly so the JTC
      # declares success as soon as the hardware has settled rather than
      # waiting for a sub-milliradian residual.
      openarm_left_joint1: {goal: 0.05}
      openarm_left_joint2: {goal: 0.05}
      openarm_left_joint3: {goal: 0.05}
      openarm_left_joint4: {goal: 0.05}
      openarm_left_joint5: {goal: 0.05}
      openarm_left_joint6: {goal: 0.05}
      openarm_left_joint7: {goal: 0.05}

right_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    # See left controller: permit cuMotion's tiny non-zero terminal velocity.
    allow_nonzero_velocity_at_trajectory_end: true
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.05
      openarm_right_joint1: {goal: 0.05}
      openarm_right_joint2: {goal: 0.05}
      openarm_right_joint3: {goal: 0.05}
      openarm_right_joint4: {goal: 0.05}
      openarm_right_joint5: {goal: 0.05}
      openarm_right_joint6: {goal: 0.05}
      openarm_right_joint7: {goal: 0.05}

left_gripper_controller:
  ros__parameters:
    joint: openarm_left_finger_joint1

right_gripper_controller:
  ros__parameters:
    joint: openarm_right_finger_joint1

lift_controller:
  ros__parameters:
    joints:
      - lift_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 20.0
    action_monitor_rate: 10.0
    # See left controller: permit cuMotion's tiny non-zero terminal velocity.
    allow_nonzero_velocity_at_trajectory_end: true
    constraints:
      # Lift is limited to ~3 cm/s so give it generous goal time.
      # lift_homing_node.py signals SUCCEEDED when the motor physically
      # arrives, so this just prevents premature ABORTED.
      goal_time: 5.0
      stopped_velocity_tolerance: 0.005
      lift_joint: {goal: 0.005}
