# joint_limits.yaml allows the dynamics properties specified in the URDF to be overwritten or augmented as needed

# Velocity / acceleration scaling applied to every planned trajectory.
# At 0.1 (the MoveItSetupAssistant default), the effective acceleration is
# only 10 % of the URDF limit, which makes even short moves take 10–30 s.
# 0.5 / 0.3 are conservative but practical values; raise them once the
# hardware behaviour at higher speeds has been validated.
default_velocity_scaling_factor: 0.5
default_acceleration_scaling_factor: 0.3

# Specific joint properties can be changed with the keys [max_position, min_position, max_velocity, max_acceleration]
# Joint limits can be turned off with [has_velocity_limits, has_acceleration_limits]
# min_position / max_position mirror the URDF (description package) limits, EXCEPT
# joint4 and joint7 (both arms) which are widened by +/-0.02 rad. MoveIt 2.12 removed
# start_state_max_bounds_error, so CheckStartStateBounds enforces these bounds
# strictly with no tolerance; the buffer on joint4/joint7 lets a start state sitting
# slightly past a hard stop (homing / encoder offset) still pass instead of making
# the planner reject the request. joint1 / joint2 differ between arms because the
# URDF applies a per-arm offset (and reflection) to those two joints.
joint_limits:
  openarm_left_finger_joint1:
    min_position: 0.0
    max_position: 0.044
    has_velocity_limits: true
    max_velocity: 10.0
    has_acceleration_limits: true
    max_acceleration: 1.0
    max_deceleration: -1.5
  openarm_left_joint1:
    min_position: -3.490659
    max_position: 1.396263
    has_velocity_limits: true
    max_velocity: 16.754666
    has_acceleration_limits: true
    max_acceleration: 1.0
    max_deceleration: -1.5
  openarm_left_joint2:
