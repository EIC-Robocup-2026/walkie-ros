# config/zed2i_yaml
# Parameters for Stereolabs zed2i camera

---
/**:
  ros__parameters:
    general:
      camera_model: "zed2i"
      camera_name: "zed2i" # overwritten by launch file
      grab_resolution: "HD2K" # The native camera grab resolution. 'HD2K', 'HD1080', 'HD720', 'VGA', 'AUTO'
      grab_frame_rate: 15 # ZED SDK internal grabbing rate
      pub_frame_rate: 15.0
      pub_resolution: "NATIVE"

    video:
      brightness: 4 # [DYNAMIC] Image brightness. Range: 0-8
      contrast: 4 # [DYNAMIC] Image contrast. Range: 0-8
      hue: 0 # [DYNAMIC] Image hue. Range: 0 to 11

    depth:
      depth_mode: 'NEURAL_PLUS'
      min_depth: 0.01 # Min: 0.01, Max: 3.0
      max_depth: 15.0 # Min: 0.5, Max: 20.0

      point_cloud_freq: 15.0 # Set to 30Hz for full-speed cloud
      point_cloud_res: "COMPACT" # The resolution used for point cloud publishing - 'COMPACT'-Standard resolution. Optimizes processing and bandwidth, 'REDUCED'-Half resolution. Low processing and bandwidth requirements

      # --- post-processing filters (all [DYNAMIC], tunable at runtime via ros2 param set) ---
      depth_confidence: 80 # 0-100, lower = more aggressive (discards more low-confidence pixels / flying pixels)
      depth_texture_conf: 100 # 0-100, lower = drop depth in low-texture areas
      remove_saturated_areas: true # drop depth in saturated/over-exposed regions
      depth_stabilization: 10 # 0-100 temporal stabilization (-1=SDK default, 0=off)