name: Build and Push All Walkie Images

on:
  push:
    branches:
      - main
      - feat/github_action_CI/CD
  workflow_dispatch:

jobs:
  # ----------------------------------------
  # Job ที่ 1: Build ตัว Simulation
  # ----------------------------------------
  build-sim-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/walkie-simulation
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.simulation
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ----------------------------------------
  # Job ที่ 2:  Build ตัว Physical
  # ----------------------------------------
  build-another-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/walkie-physical
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.physical
          push: true
          tags: ${{ steps.meta.outputs.tags }}